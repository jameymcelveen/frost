<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Frost — Temple Puzzle</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #1a1510;
        font-family: system-ui, sans-serif;
        color: #e8dcc8;
      }
      #app {
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }
      #hud {
        padding: 0.5rem 1rem;
        font-size: 0.875rem;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        opacity: 0.85;
      }
      #game-root {
        flex: 1;
        width: 100%;
        max-height: calc(100% - 2.5rem);
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #game-root svg {
        max-width: 100%;
        max-height: 100%;
        touch-action: none;
      }
      .overlay {
        position: fixed;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        background: rgba(10, 8, 6, 0.72);
        font-size: 1.5rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        pointer-events: none;
      }
      .overlay.visible {
        display: flex;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="hud"></div>
      <div id="game-root"></div>
    </div>
    <div id="overlay" class="overlay" aria-live="polite"></div>
    <script type="module" src="/src/app/main.ts"></script>
  </body>
</html>
