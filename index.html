<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <title>Frost — Temple Puzzle</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        -webkit-tap-highlight-color: transparent;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        overscroll-behavior: none;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        -webkit-touch-callout: none;
        background: #1a1510;
        font-family: system-ui, sans-serif;
        color: #e8dcc8;
      }
      #app {
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: stretch;
        justify-content: center;
        padding: env(safe-area-inset-top, 0) env(safe-area-inset-right, 0)
          env(safe-area-inset-bottom, 0) env(safe-area-inset-left, 0);
      }
      #hud {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.5rem;
        padding: 0.35rem 0.75rem;
        font-size: 0.75rem;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        opacity: 0.85;
        flex-shrink: 0;
      }
      #hud-text {
        flex: 1;
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      #dpad-toggle {
        flex-shrink: 0;
        padding: 0.25rem 0.5rem;
        border: 1px solid #6b5a45;
        border-radius: 4px;
        background: #2a2218;
        color: #e8dcc8;
        font-size: 0.65rem;
        letter-spacing: 0.08em;
        cursor: pointer;
      }
      #playfield {
        flex: 1;
        display: flex;
        flex-direction: row;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        min-height: 0;
        width: 100%;
      }
      #game-root {
        flex: 1;
        min-width: 0;
        min-height: 0;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        touch-action: none;
      }
      #game-root svg {
        max-width: 100%;
        max-height: 100%;
        touch-action: none;
      }
      .dpad {
        flex-shrink: 0;
        display: grid;
        grid-template-columns: repeat(3, 2.75rem);
        grid-template-rows: repeat(3, 2.75rem);
        gap: 0.2rem;
        margin-right: 0.25rem;
      }
      .dpad.hidden {
        display: none;
      }
      .dpad button {
        border: 1px solid #6b5a45;
        border-radius: 6px;
        background: #3d3428;
        color: #e8dcc8;
        font-size: 1rem;
        touch-action: manipulation;
        cursor: pointer;
      }
      .dpad button:active {
        background: #5a4a38;
      }
      .dpad .dpad-spacer {
        visibility: hidden;
        pointer-events: none;
      }
      .dpad [data-dir='confirm'] {
        font-size: 0.85rem;
      }
      .overlay {
        position: fixed;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        background: rgba(10, 8, 6, 0.72);
        font-size: 1.25rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        pointer-events: none;
        padding: env(safe-area-inset-top, 0) env(safe-area-inset-right, 0)
          env(safe-area-inset-bottom, 0) env(safe-area-inset-left, 0);
        text-align: center;
      }
      .overlay.visible {
        display: flex;
      }
      .overlay.overlay--actionable {
        pointer-events: auto;
        touch-action: manipulation;
      }
      @media (orientation: portrait) {
        #playfield {
          flex-direction: column;
        }
        .dpad {
          margin-right: 0;
          margin-top: 0.25rem;
        }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="hud">
        <span id="hud-text"></span>
        <button id="dpad-toggle" type="button" aria-pressed="false">
          PAD
        </button>
      </div>
      <div id="playfield">
        <div id="game-root"></div>
        <div id="dpad" class="dpad hidden" aria-label="Direction pad">
          <span class="dpad-spacer"></span>
          <button type="button" data-dir="north" aria-label="North">▲</button>
          <span class="dpad-spacer"></span>
          <button type="button" data-dir="west" aria-label="West">◀</button>
          <button type="button" data-dir="confirm" aria-label="Reset">
            ●
          </button>
          <button type="button" data-dir="east" aria-label="East">▶</button>
          <span class="dpad-spacer"></span>
          <button type="button" data-dir="south" aria-label="South">▼</button>
          <span class="dpad-spacer"></span>
        </div>
      </div>
    </div>
    <div id="overlay" class="overlay" aria-live="polite"></div>
    <script type="module" src="/src/app/main.ts"></script>
  </body>
</html>
